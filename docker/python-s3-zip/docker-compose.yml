services:

    orthanc-s3-default:
        image: orthancteam/orthanc-pre-release:master-unstable
        ports: [8052:8042]
        depends_on:
            - toxiproxy-s3
            - toxiproxy-pg-s3
        # volumes:
        #     - orthanc-s3-default-sqlite-storage:/var/lib/orthanc/db
        environment:
            ORTHANC_JSON: |
                {
                    "Name": "ORTHANC S3 default",
                    "AuthenticationEnabled": false,
                    "DicomServerEnabled": false,
                    "StableAge": 5,
                    "AwsS3Storage": {
                        "BucketName": "default-bucket",
                        "Region": "eu-west-1",
                        "AccessKey": "minio",
                        "SecretKey": "miniopwd",
                        "Endpoint": "http://toxiproxy-s3:9000",
                        "VirtualAddressing": false
                    },
                    "PostgreSQL" : {
                        "Host": "toxiproxy-pg-s3"
                    }
                }
            VERBOSE_ENABLED: "true"
            VERBOSE_STARTUP: "true"

    orthanc-s3-zip:
        build: .
        # image: orthancteam/orthanc-pre-release:master-unstable
        ports: [8053:8042]
        depends_on:
            - toxiproxy-s3
            - toxiproxy-pg-default
        volumes:
            # - orthanc-s3-zip-sqlite-storage:/var/lib/orthanc/db
            - ./tmp-local-storage/:/tmp-local-storage
            - ./plugin:/plugin
        environment:
            ORTHANC_JSON: |
                {
                    "Name": "ORTHANC S3 zip",
                    "AuthenticationEnabled": false,
                    "DicomServerEnabled": false,
                    "PythonScript": "/plugin/plugin.py",
                    "StableAge": 5,
                    "S3Zip": {
                        "LocalTemporaryFolder": "/tmp-local-storage",
                        "BucketName": "zip-bucket",
                        "Region": "eu-west-1",
                        "AccessKey": "minio",
                        "SecretKey": "miniopwd",
                        "Endpoint": "http://toxiproxy-s3:9000",
                        "VirtualAddressing": false,
                        "EnableCompression": false,
                        "LocalStorageMaxSizeMB": 3000,
                        "PrefixKey": "orthanc-zips",
                        "S3HousekeeperIntervalSeconds": 5
                    },
                    "Python": {
                        "AllowThreads": true
                    },
                    "OrthancExplorer2": {
                        "UiOptions": {
                            "EnableApiViewMenu": true
                        }
                    },
                    "PostgreSQL" : {
                        "Host": "toxiproxy-pg-default"
                    }
                }
            VERBOSE_ENABLED: "true"
            VERBOSE_STARTUP: "true"
            S3ZIP_LOG_LEVEL: "INFO"

    minio:
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        # don't expose these ports in a real world setup
        ports: [9000:9000, 9001:9001]
        environment:
            - MINIO_REGION=eu-west-1
            - MINIO_ROOT_USER=minio
            - MINIO_ROOT_PASSWORD=miniopwd
        volumes:
            - minio-storage:/data
        entrypoint: sh
        command: -c 'mkdir -p /data/default-bucket && mkdir -p /data/zip-bucket && /usr/bin/docker-entrypoint.sh server /data --console-address ":9001"'

    toxiproxy-s3:
        depends_on: 
            - minio
        ports: ["19000:9000"]
        image: ghcr.io/shopify/toxiproxy

    toxiproxy-pg-s3:
        depends_on: 
            - pg-s3
        ports: ["15432:5432"]
        image: ghcr.io/shopify/toxiproxy

    toxiproxy-pg-default:
        depends_on: 
            - pg-default
        ports: ["25432:5432"]
        image: ghcr.io/shopify/toxiproxy

    toxiproxy-config:
        image: curlimages/curl
        depends_on: 
            - toxiproxy-s3
            - toxiproxy-pg-s3
            - toxiproxy-pg-default
        restart: on-failure
        entrypoint: >
            sh -c "sleep 3;
            curl -sf -X POST http://toxiproxy-s3:8474/proxies -H 'Content-Type: application/json' -d '{\"name\":\"minio\",\"listen\":\"0.0.0.0:9000\",\"upstream\":\"minio:9000\"}';
            curl -sf -X POST http://toxiproxy-s3:8474/proxies/minio/toxics -H 'Content-Type: application/json' -d '{\"type\":\"latency\",\"attributes\":{\"latency\":50,\"jitter\":0}}';
            curl -sf -X POST http://toxiproxy-pg-s3:8474/proxies -H 'Content-Type: application/json' -d '{\"name\":\"pg-s3\",\"listen\":\"0.0.0.0:5432\",\"upstream\":\"pg-s3:5432\"}';
            curl -sf -X POST http://toxiproxy-pg-s3:8474/proxies/pg-s3/toxics -H 'Content-Type: application/json' -d '{\"type\":\"latency\",\"attributes\":{\"latency\":10,\"jitter\":0}}';
            curl -sf -X POST http://toxiproxy-pg-default:8474/proxies -H 'Content-Type: application/json' -d '{\"name\":\"pg-default\",\"listen\":\"0.0.0.0:5432\",\"upstream\":\"pg-default:5432\"}';
            curl -sf -X POST http://toxiproxy-pg-default:8474/proxies/pg-default/toxics -H 'Content-Type: application/json' -d '{\"type\":\"latency\",\"attributes\":{\"latency\":10,\"jitter\":0}}';"


    pg-s3:
        image: postgres:18
        restart: unless-stopped
        # ports: ["5432:5432"]
        volumes: ["orthanc-s3-db:/var/lib/postgresql/18/docker"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: "trust"

    pg-default:
        image: postgres:18
        restart: unless-stopped
        # ports: ["5432:5432"]
        volumes: ["orthanc-default-db:/var/lib/postgresql/18/docker"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: "trust"

volumes:
    minio-storage:
    orthanc-default-db:
    orthanc-s3-db:
